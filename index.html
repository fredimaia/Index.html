<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Site Básico</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Olá — Site Básico</h1>
      <p>Exemplo mínimo publicado com GitHub Pages.</p>
    </header>

    <section class="hero" aria-label="Frente com animal azul">
      <div class="hero-inner">
        <!-- SVG simples de um animal azul (elefante estilizado) -->
        <svg width="280" height="180" viewBox="0 0 280 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="false">
          <title>Elefante azul estilizado</title>
          <rect width="100%" height="100%" fill="transparent"/>
          <g transform="translate(10,30)">
            <ellipse cx="120" cy="60" rx="90" ry="45" fill="#2b8cff" />
            <circle cx="60" cy="35" r="30" fill="#2b8cff" />
            <rect x="20" y="60" width="12" height="28" rx="4" fill="#2b8cff" />
            <rect x="50" y="60" width="12" height="28" rx="4" fill="#2b8cff" />
            <rect x="150" y="60" width="12" height="28" rx="4" fill="#2b8cff" />
            <rect x="180" y="60" width="12" height="28" rx="4" fill="#2b8cff" />
            <!-- Tromba -->
            <path d="M78 45 q40 10 60 30 q-8 8 -18 6 q6 -18 -6 -28 q-18 -14 -36 -8" fill="#2b8cff" />
            <!-- Olho -->
            <circle cx="72" cy="30" r="4" fill="#fff" />
            <circle cx="73" cy="31" r="2" fill="#111" />
          </g>
        </svg>
        <div class="hero-text">
          <h2>Animal Azul</h2>
          <p>Um elefante azul estilizado na frente da página.</p>
        </div>
      </div>
    </section>

    <main>
      <section>
        <h2>Sobre</h2>
        <p>Este é um site estático simples criado para demonstração.</p>
      </section>
      <section>
        <h2>Contato</h2>
        <form id="contact-form">
          <label for="name">Nome</label>
          <input id="name" name="name" required />
          <label for="message">Mensagem</label>
          <textarea id="message" name="message" required></textarea>
          <button type="submit">Enviar</button>
        </form>
        <p id="response" aria-live="polite"></p>
      </section>
    </main>

    <footer>
      <small>© 2026</small>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
